<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>潭酒金算盘利润测算话术生成器</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #28231f;
      --muted: #6e6258;
      --line: #ded6ca;
      --panel: #fffaf2;
      --brand: #b3261e;
      --gold: #d49a2f;
      --ok: #1f7a4d;
      --tap: 48px;
      --shadow: 0 18px 55px rgba(76, 47, 21, .13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(179, 38, 30, .08), transparent 34%),
        linear-gradient(315deg, rgba(212, 154, 47, .13), transparent 36%),
        var(--bg);
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: 0;
      line-height: 1.12;
    }

    .subhead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      flex: 0 0 auto;
      color: #fff;
      background: var(--brand);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(179, 38, 30, .22);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 18px;
      align-items: start;
    }

    section {
      background: rgba(255, 250, 242, .9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel, .result-panel { padding: 22px; }
    .result-panel { min-height: 640px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    input, select {
      height: var(--tap);
      padding: 0 12px;
    }

    textarea {
      min-height: 390px;
      resize: vertical;
      padding: 14px;
      line-height: 1.65;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 154, 47, .18);
    }

    .segmented, .series-tabs {
      display: grid;
      gap: 8px;
    }

    .segmented { grid-template-columns: 1fr 1fr; }
    .series-tabs { grid-template-columns: 1fr 1fr; margin-bottom: 16px; }

    .segmented button, .series-tabs button, .actions button, .mini-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: var(--tap);
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease, color .15s ease;
    }

    .segmented button:hover, .series-tabs button:hover, .actions button:hover, .mini-button:hover {
      transform: translateY(-1px);
    }

    .segmented button.active, .series-tabs button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .price-box, .banquet-box {
      display: grid;
      gap: 12px;
      border: 1px dashed #cdbfaccf;
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, .58);
      margin-bottom: 16px;
    }

    .box-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .box-head strong { font-size: 14px; }

    .mini-button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 13px;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch {
      position: relative;
      width: 54px;
      height: 30px;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      inset: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d7cdc0;
      border-radius: 999px;
      transition: background .16s ease;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      transition: transform .16s ease;
    }

    .switch input:checked + .slider { background: var(--brand); }
    .switch input:checked + .slider:before { transform: translateX(24px); }

    .actions {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .actions .primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      min-height: 82px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .metric.total {
      border-color: rgba(31, 122, 77, .35);
      background: rgba(31, 122, 77, .08);
    }

    .formula {
      border: 1px solid rgba(212, 154, 47, .45);
      background: rgba(212, 154, 47, .1);
      border-radius: 8px;
      padding: 12px 14px;
      color: #5b3a10;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .copy-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    .copy-row button {
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      height: 40px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .toast {
      min-height: 22px;
      color: var(--ok);
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .result-panel { min-height: auto; }
    }

    @media (max-width: 520px) {
      :root { --tap: 50px; }
      body { background: var(--bg); }
      .app-shell { width: min(100% - 16px, 1180px); padding-top: 14px; }
      header { gap: 12px; padding-bottom: 14px; }
      h1 { font-size: 26px; }
      .subhead { font-size: 14px; line-height: 1.55; }
      .badge { padding: 8px 12px; font-size: 13px; }
      main { gap: 12px; }
      .form-panel, .result-panel { padding: 14px; }
      .section-title { margin-bottom: 14px; }
      h2 { font-size: 18px; }
      .grid-2, .actions, .summary-grid { grid-template-columns: 1fr; }
      .field { margin-bottom: 12px; }
      textarea { min-height: 450px; font-size: 15px; }
      .metric { min-height: 76px; padding: 12px; }
      .metric strong { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>潭酒金算盘利润测算话术生成器</h1>
        <p class="subhead">切换系列，选择产品，默认价格可手动调整，自动生成利润测算话术。</p>
      </div>
      <div class="badge">真年份 / 潭1935</div>
    </header>

    <main>
      <section class="form-panel" aria-label="测算表单">
        <div class="section-title">
          <h2>测算信息</h2>
          <span class="hint">自动实时计算</span>
        </div>

        <div class="series-tabs" role="tablist" aria-label="产品系列">
          <button type="button" class="active" data-series="vintage">真年份系列</button>
          <button type="button" data-series="tan1935">潭1935系列</button>
        </div>

        <div class="field">
          <label for="storeName">门店名称</label>
          <input id="storeName" placeholder="例如：张老板烟酒行" autocomplete="off">
        </div>

        <div class="field">
          <label>门店类型</label>
          <div class="segmented" role="group" aria-label="门店类型">
            <button type="button" class="active" data-store-type="regular">普通网点</button>
            <button type="button" data-store-type="deposit">保证金网点</button>
          </div>
        </div>

        <div class="field">
          <label for="product">产品</label>
          <select id="product"></select>
        </div>

        <div class="price-box">
          <div class="box-head">
            <strong>进销价</strong>
            <button class="mini-button" type="button" id="restorePriceBtn">恢复默认</button>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="costPrice">进货价</label>
              <input id="costPrice" type="number" min="0" step="0.01" inputmode="decimal">
            </div>
            <div class="field">
              <label for="retailPrice">零售价</label>
              <input id="retailPrice" type="number" min="0" step="0.01" inputmode="decimal">
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="soldBottles">动销瓶数</label>
            <input id="soldBottles" type="number" min="0" step="1" value="0" inputmode="numeric">
          </div>
          <div class="field">
            <label for="openedBottles">开瓶数</label>
            <input id="openedBottles" type="number" min="0" step="1" value="0" inputmode="numeric">
          </div>
        </div>

        <div class="banquet-box">
          <div class="toggle">
            <label for="isBanquet">是否宴席</label>
            <label class="switch" aria-label="是否宴席">
              <input id="isBanquet" type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
          <div class="field" id="tableField" hidden>
            <label for="tables">宴席桌数</label>
            <input id="tables" type="number" min="0" step="1" value="0" inputmode="numeric">
          </div>
          <div class="toggle" id="doubleFeeField" hidden>
            <label for="isDoubleFee">看桌费翻倍</label>
            <label class="switch" aria-label="看桌费翻倍">
              <input id="isDoubleFee" type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button class="primary" type="button" id="generateBtn">生成话术</button>
          <button type="button" id="resetBtn">清空重填</button>
        </div>
      </section>

      <section class="result-panel" aria-label="测算结果">
        <div class="section-title">
          <h2>利润测算结果</h2>
          <span class="hint" id="modeLabel">普通网点</span>
        </div>

        <div class="summary-grid">
          <div class="metric">
            <span>顺差利润</span>
            <strong id="marginProfit">0 元</strong>
          </div>
          <div class="metric">
            <span>开瓶红包</span>
            <strong id="scanProfit">0 元</strong>
          </div>
          <div class="metric">
            <span>宴席奖励</span>
            <strong id="banquetProfit">0 元</strong>
          </div>
          <div class="metric total">
            <span>合计利润</span>
            <strong id="totalProfit">0 元</strong>
          </div>
        </div>

        <div class="formula" id="formulaText"></div>
        <textarea id="scriptOutput" readonly></textarea>
        <div class="copy-row">
          <span class="toast" id="toast"></span>
          <button type="button" id="copyBtn">复制话术</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const seriesData = {
      vintage: {
        label: "真年份系列",
        products: [
          { id: "red53", name: "53°红潭", family: "红潭", retail: 238, sloganRegular: "走红毯，喝红潭，生活最有仪式感！", sloganDeposit: "保证金模式更赚钱！走红毯，喝红潭，生活最有仪式感！", prices: { regular: { cost: 190, scan: 25 }, deposit: { cost: 184, scan: 30 } } },
          { id: "gold53", name: "53°潭金酱", family: "潭金酱", retail: 150, sloganRegular: "潭金酱，200元以内酱酒品质典范！", sloganDeposit: "保证金模式更赚钱！潭金酱，200元以内酱酒性价比典范！", prices: { regular: { cost: 121, scan: 20 }, deposit: { cost: 117, scan: 25 } } },
          { id: "silver53", name: "53°银潭", family: "银潭", retail: 100, sloganRegular: "百元酱酒，首推银潭！", sloganDeposit: "保证金模式更赚钱！百元酱酒，首推银潭！", prices: { regular: { cost: 85, scan: 16 }, deposit: { cost: 82, scan: 20 } } },
          { id: "red39", name: "39°红潭", family: "红潭", retail: 220, sloganRegular: "走红毯，喝红潭，生活最有仪式感！", sloganDeposit: "保证金模式更赚钱！走红毯，喝红潭，生活最有仪式感！", prices: { regular: { cost: 175, scan: 21 }, deposit: { cost: 168, scan: 27 } } },
          { id: "gold39", name: "39°潭金酱", family: "潭金酱", retail: 130, sloganRegular: "潭金酱，200元以内酱酒品质典范！", sloganDeposit: "保证金模式更赚钱！潭金酱，200元以内酱酒性价比典范！", prices: { regular: { cost: 108, scan: 17 }, deposit: { cost: 104, scan: 20 } } },
          { id: "silver39", name: "39°银潭", family: "银潭", retail: 95, sloganRegular: "百元酱酒，首推银潭！", sloganDeposit: "保证金模式更赚钱！百元酱酒，首推银潭！", prices: { regular: { cost: 81, scan: 13 }, deposit: { cost: 78, scan: 15 } } }
        ]
      },
      tan1935: {
        label: "潭1935系列",
        products: [
          { id: "white1935", name: "39°&53°潭1935小白潭", family: "小白潭", retail: 60, sloganRegular: "百元酱酒，首推1935小白潭！", sloganDeposit: "百元酱酒，首推1935小白潭！", prices: { regular: { cost: 50, scan: 7 }, deposit: { cost: 50, scan: 7 } } },
          { id: "red1935_53", name: "53°潭1935小红潭", family: "小红潭", retail: 110, sloganRegular: "办宴席，首推1935小红潭！", sloganDeposit: "办宴席，首推1935小红潭！", prices: { regular: { cost: 86, scan: 7 }, deposit: { cost: 86, scan: 7 } } },
          { id: "red1935_39", name: "39°潭1935小红潭", family: "小红潭", retail: 105, sloganRegular: "办宴席，首推1935小红潭！", sloganDeposit: "办宴席，首推1935小红潭！", prices: { regular: { cost: 82, scan: 7 }, deposit: { cost: 82, scan: 7 } } }
        ]
      }
    };

    const banquetRules = {
      "银潭": { baseFee: 15, bonusFee: 30, extraGift: "", tiers: [{ minTables: 30, minBottles: 48 }, { minTables: 10, minBottles: 30 }, { minTables: 3, minBottles: 18 }, { minTables: 1, minBottles: 6 }] },
      "潭金酱": { baseFee: 20, bonusFee: 40, extraGift: "", tiers: [{ minTables: 30, minBottles: 42 }, { minTables: 10, minBottles: 24 }, { minTables: 3, minBottles: 12 }, { minTables: 1, minBottles: 6 }] },
      "红潭": { baseFee: 40, bonusFee: 80, extraGift: "15桌以上奖励门店1瓶1L红潭", tiers: [{ minTables: 30, minBottles: 36 }, { minTables: 10, minBottles: 18 }, { minTables: 3, minBottles: 9 }, { minTables: 1, minBottles: 6 }] },
      "小白潭": { baseFee: 10, bonusFee: 20, extraGift: "", tiers: [{ minTables: 30, minBottles: 36 }, { minTables: 10, minBottles: 24 }, { minTables: 3, minBottles: 12 }, { minTables: 1, minBottles: 6 }] },
      "小红潭": { baseFee: 20, bonusFee: 40, extraGift: "", tiers: [{ minTables: 30, minBottles: 36 }, { minTables: 10, minBottles: 24 }, { minTables: 3, minBottles: 12 }, { minTables: 1, minBottles: 6 }] }
    };

    const els = {
      storeName: document.getElementById("storeName"),
      product: document.getElementById("product"),
      costPrice: document.getElementById("costPrice"),
      retailPrice: document.getElementById("retailPrice"),
      soldBottles: document.getElementById("soldBottles"),
      openedBottles: document.getElementById("openedBottles"),
      isBanquet: document.getElementById("isBanquet"),
      isDoubleFee: document.getElementById("isDoubleFee"),
      tables: document.getElementById("tables"),
      tableField: document.getElementById("tableField"),
      doubleFeeField: document.getElementById("doubleFeeField"),
      modeLabel: document.getElementById("modeLabel"),
      marginProfit: document.getElementById("marginProfit"),
      scanProfit: document.getElementById("scanProfit"),
      banquetProfit: document.getElementById("banquetProfit"),
      totalProfit: document.getElementById("totalProfit"),
      formulaText: document.getElementById("formulaText"),
      scriptOutput: document.getElementById("scriptOutput"),
      toast: document.getElementById("toast")
    };

    let currentSeries = "vintage";
    let storeType = "regular";

    function yuan(value) {
      return `${Number(value || 0).toLocaleString("zh-CN", { maximumFractionDigits: 2 })} 元`;
    }

    function cleanNumber(value) {
      return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(2)));
    }

    function numberValue(el) {
      return Math.max(0, Math.floor(Number(el.value) || 0));
    }

    function moneyValue(el) {
      return Math.max(0, Number(el.value) || 0);
    }

    function getProducts() {
      return seriesData[currentSeries].products;
    }

    function getSelectedProduct() {
      return getProducts().find(item => item.id === els.product.value) || getProducts()[0];
    }

    function getDefaultPrice(product) {
      const price = product.prices[storeType] || product.prices.regular;
      return { cost: price.cost, retail: product.retail, scan: price.scan };
    }

    function fillProducts() {
      els.product.innerHTML = getProducts().map(item => `<option value="${item.id}">${item.name}</option>`).join("");
      restoreDefaultPrice();
    }

    function restoreDefaultPrice() {
      const product = getSelectedProduct();
      const defaults = getDefaultPrice(product);
      els.costPrice.value = defaults.cost;
      els.retailPrice.value = defaults.retail;
      buildScript();
    }

    function calcBanquet(product, soldBottles, tables, enabled, doubleFeeEnabled) {
      if (!enabled || tables <= 0) {
        return { amount: 0, fee: 0, tier: null, message: "本单没有算宴席奖励。" };
      }

      const rule = banquetRules[product.family];
      const tier = rule.tiers.find(item => tables >= item.minTables && soldBottles >= item.minBottles);

      if (!tier) {
        return {
          amount: 0,
          fee: 0,
          tier: null,
          message: `${tables}桌宴席目前用酒数量还不够看桌费要求，这部分奖励先不算。`
        };
      }

      const canDouble = tables >= 3;
      const fee = doubleFeeEnabled && canDouble ? rule.bonusFee : rule.baseFee;
      const amount = fee * tables;
      const gift = rule.extraGift && tables >= 15 ? `，另外还有${rule.extraGift}` : "";
      const feeText = doubleFeeEnabled && canDouble ? "看桌费按翻倍算" : "还能拿看桌费";

      return {
        amount,
        fee,
        tier,
        message: `${product.family}宴席${tables}桌，${feeText}${fee}元/桌，这一场宴席额外奖励${fee}×${tables}=${amount}元${gift}。`
      };
    }

    function buildScript() {
      const storeName = els.storeName.value.trim() || "本门店";
      const product = getSelectedProduct();
      const defaults = getDefaultPrice(product);
      const cost = moneyValue(els.costPrice);
      const retail = moneyValue(els.retailPrice);
      const scan = defaults.scan;
      const storeTypeName = storeType === "deposit" ? "保证金网点" : "普通网点";
      const sold = numberValue(els.soldBottles);
      const opened = numberValue(els.openedBottles);
      const tables = numberValue(els.tables);
      const margin = retail - cost;
      const marginProfit = margin * sold;
      const scanProfit = scan * opened;
      const banquet = calcBanquet(product, sold, tables, els.isBanquet.checked, els.isDoubleFee.checked);
      const total = marginProfit + scanProfit + banquet.amount;
      const perBottleIfOpened = margin + scan;
      const slogan = storeType === "deposit" ? product.sloganDeposit : product.sloganRegular;
      const customText = (cost !== defaults.cost || retail !== defaults.retail) ? "（本次按门店实际进销价测算）" : "";

      els.modeLabel.textContent = `${seriesData[currentSeries].label} · ${storeTypeName}`;
      els.marginProfit.textContent = yuan(marginProfit);
      els.scanProfit.textContent = yuan(scanProfit);
      els.banquetProfit.textContent = yuan(banquet.amount);
      els.totalProfit.textContent = yuan(total);
      els.formulaText.innerHTML =
        `${product.name}：零售价${cleanNumber(retail)}元，进货价${cleanNumber(cost)}元，单瓶顺差${cleanNumber(margin)}元；开瓶红包均值${scan}元。<br>` +
        `本单合计 = ${cleanNumber(margin)}×${sold} + ${scan}×${opened} + ${cleanNumber(banquet.amount)} = ${cleanNumber(total)}元。`;

      const lines = [
        `${storeName}${storeTypeName}${product.name}利润测算：`,
        "",
        `${product.name}进货价${cleanNumber(cost)}元，零售价按${cleanNumber(retail)}元，单瓶顺差${cleanNumber(retail)}-${cleanNumber(cost)}=${cleanNumber(margin)}元${customText}。`,
        `消费者开瓶扫码后反向红包均值${scan}元，单瓶开瓶后合计利润${cleanNumber(margin)}+${scan}=${cleanNumber(perBottleIfOpened)}元。`,
        "",
        `本单动销${sold}瓶，顺差利润${cleanNumber(margin)}×${sold}=${cleanNumber(marginProfit)}元。`,
        `本单开瓶${opened}瓶，开瓶红包${scan}×${opened}=${cleanNumber(scanProfit)}元。`,
        banquet.message,
        "",
        `这一单合计利润：${cleanNumber(marginProfit)}+${cleanNumber(scanProfit)}+${cleanNumber(banquet.amount)}=${cleanNumber(total)}元。`,
        `相当于卖了${sold}瓶${product.family}，到手${cleanNumber(total)}元利润。`,
        slogan
      ];

      els.scriptOutput.value = lines.join("\n");
    }

    function setSeries(series) {
      currentSeries = series;
      document.querySelectorAll("[data-series]").forEach(btn => btn.classList.toggle("active", btn.dataset.series === series));
      fillProducts();
    }

    function init() {
      fillProducts();

      document.querySelectorAll("[data-series]").forEach(button => {
        button.addEventListener("click", () => setSeries(button.dataset.series));
      });

      document.querySelectorAll("[data-store-type]").forEach(button => {
        button.addEventListener("click", () => {
          storeType = button.dataset.storeType;
          document.querySelectorAll("[data-store-type]").forEach(btn => btn.classList.toggle("active", btn === button));
          restoreDefaultPrice();
        });
      });

      els.product.addEventListener("change", restoreDefaultPrice);
      document.getElementById("restorePriceBtn").addEventListener("click", restoreDefaultPrice);

      [els.storeName, els.costPrice, els.retailPrice, els.soldBottles, els.openedBottles, els.tables, els.isBanquet, els.isDoubleFee].forEach(el => {
        el.addEventListener("input", buildScript);
        el.addEventListener("change", buildScript);
      });

      els.isBanquet.addEventListener("change", () => {
        els.tableField.hidden = !els.isBanquet.checked;
        els.doubleFeeField.hidden = !els.isBanquet.checked;
        if (!els.isBanquet.checked) {
          els.isDoubleFee.checked = false;
        }
        buildScript();
      });

      document.getElementById("generateBtn").addEventListener("click", buildScript);
      document.getElementById("resetBtn").addEventListener("click", () => {
        els.storeName.value = "";
        els.soldBottles.value = 0;
        els.openedBottles.value = 0;
        els.tables.value = 0;
        els.isBanquet.checked = false;
        els.isDoubleFee.checked = false;
        els.tableField.hidden = true;
        els.doubleFeeField.hidden = true;
        restoreDefaultPrice();
      });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(els.scriptOutput.value);
        } catch (error) {
          els.scriptOutput.focus();
          els.scriptOutput.select();
          document.execCommand("copy");
        }
        els.toast.textContent = "已复制";
        setTimeout(() => els.toast.textContent = "", 1600);
      });

      buildScript();
    }

    init();
  </script>
</body>
</html>
